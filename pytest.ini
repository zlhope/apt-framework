[tool:pytest]
minversion = 6.0
addopts = -v --tb=short

testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    ui: UI 测试用例
    api: API 测试用例

# 测试覆盖率配置（可选，需要安装 pytest-cov）
# addopts = --cov=aw --cov=utils --cov-report=html --cov-report=term-missing